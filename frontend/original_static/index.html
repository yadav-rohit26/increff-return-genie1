<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Increff Return AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="increff-bg d-flex align-items-center justify-content-center vh-100 px-3">
    <div class="increff-card bg-white p-4 p-md-5 shadow-sm border-0 rounded-1 animate-fade-in"
        style="max-width: 420px; width: 100%;">

        <div class="text-center mb-4">
            <img src="https://cdn.prod.website-files.com/64dacf5e829926e42212e23f/67ea4b4e92d4fccc9bfe60c2_65d6d8b6f1213f493da7d67f_Original%2520Logo_Increff%2520(1).png"
                alt="Increff" height="36" class="mb-3">
            <!-- <h2 class="inc-text-sm fw-bold text-gray-800 uppercase tracking-tight m-0">Internal Access Portal</h2> -->
            <div class="d-flex align-items-center justify-content-center gap-1 mt-1">
                <p class="inc-text-xs text-muted uppercase m-0">Return Genie</p>
                <img src="/resources/genie.png" alt="Return Genie logo" id="Genie">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label inc-text-xs fw-bold text-secondary uppercase">User ID</label>
            <input type="text" id="login-user" class="form-control inc-text-sm rounded-1 shadow-none focus-primary">
        </div>

        <div class="mb-4">
            <label class="form-label inc-text-xs fw-bold text-secondary uppercase">Password</label>
            <div class="input-group">
                <input type="password" id="login-pass"
                    class="form-control inc-text-sm rounded-start-1 shadow-none focus-primary border-end-0">
                <span class="input-group-text bg-white border-start-0 rounded-end-1 cursor-pointer" id="toggle-password"
                    style="cursor: pointer;">
                    <i class="fa-solid fa-eye text-secondary" id="eye-icon"></i>
                </span>
            </div>
        </div>

        <button id="login-btn"
            class="btn btn-primary w-100 rounded-1 inc-text-xs fw-bold uppercase tracking-widest py-2">Log In</button>

        <div id="login-error" class="inc-text-xs text-danger mt-3 text-center d-none fw-bold">
            <i class="fa-solid fa-circle-exclamation me-1"></i> Access Denied: Invalid Credentials
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>
