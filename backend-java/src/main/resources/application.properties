spring.config.import=optional:file:.env[.properties]

server.port=${PORT:5000}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/return-genie}
spring.data.mongodb.auto-index-creation=false

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

jwt.secret=${JWT_SECRET:supersecretjwtkey_please_change_in_production}
jwt.expiration-hours=12

n8n.webhook.url=${N8N_WEBHOOK_URL:}
n8n.timeout-millis=600000

logging.level.org.springframework=INFO
